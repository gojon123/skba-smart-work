<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SKBA Smart Work</title>
  <link rel="stylesheet" href="./assets/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="app">
    <section id="login-screen" class="screen active">
      <div class="card auth-card">
        <h1>SKBA Smart Work</h1>
        <p class="muted">실시간 서버 동기화 / 실서버 인증 버전</p>
        <label>Language</label>
        <div class="lang-row">
          <button class="lang-btn active" data-lang="ko">한국어</button>
          <button class="lang-btn" data-lang="en">English</button>
        </div>
        <label>Email</label>
        <input id="login-email" type="email" placeholder="engineer@company.com" />
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
        <div class="auth-actions">
          <button id="login-btn">Login</button>
          <button id="logout-btn" class="ghost hidden">Logout</button>
        </div>
        <div id="auth-status" class="status"></div>
        <details class="setup-box">
          <summary>Supabase 연결 안내</summary>
          <p>js/config.js 파일에 SUPABASE_URL / SUPABASE_ANON_KEY 입력 후 사용합니다.</p>
        </details>
      </div>
    </section>

    <section id="main-screen" class="screen hidden">
      <header class="topbar">
        <div>
          <strong id="top-user-name">-</strong>
          <span id="top-role" class="badge">-</span>
        </div>
        <div class="top-actions">
          <button class="tab-btn active" data-tab="calendar">캘린더</button>
          <button class="tab-btn" data-tab="pay">월급계산</button>
          <button class="tab-btn role-extra" data-tab="chat">채팅</button>
          <button class="tab-btn role-extra" data-tab="handover">인수인계</button>
          <button class="tab-btn role-extra" data-tab="search">통합검색</button>
          <button id="open-settings" class="ghost">설정</button>
        </div>
      </header>

      <main>
        <section id="tab-calendar" class="tab active">
          <div class="grid-2">
            <div class="card">
              <div class="section-head">
                <h2>내 캘린더</h2>
                <div>
                  <button id="prev-month" class="ghost">◀</button>
                  <span id="month-label"></span>
                  <button id="next-month" class="ghost">▶</button>
                </div>
              </div>
              <div id="calendar-grid" class="calendar-grid"></div>
            </div>
            <div class="card">
              <h2>조별 기본 근무</h2>
              <div id="team-pattern-box"></div>
              <div id="calendar-edit-box" class="editor-box hidden">
                <h3 id="edit-date-title">-</h3>
                <div class="shift-buttons">
                  <button class="shift-btn day" data-shift="D">D</button>
                  <button class="shift-btn night" data-shift="N">N</button>
                  <button class="shift-btn off" data-shift="O">O</button>
                </div>
                <button id="save-shift-btn">저장</button>
                <div id="calendar-edit-status" class="status"></div>
              </div>
            </div>
          </div>
        </section>

        <section id="tab-pay" class="tab hidden">
          <div class="card">
            <h2>월급 계산</h2>
            <div class="pay-grid">
              <label>Base Rate <input id="base-rate" type="number" step="0.01" value="28" /></label>
              <label>Night Diff <input id="night-diff" type="number" step="0.01" value="3" /></label>
              <label>Insurance <input id="insurance" type="number" step="0.01" value="0" /></label>
              <label>401k % <input id="k401" type="number" step="0.01" value="6" /></label>
              <label>Federal % <input id="federal-tax" type="number" step="0.01" value="10" /></label>
              <label>Georgia % <input id="ga-tax" type="number" step="0.01" value="5.19" /></label>
            </div>
            <button id="recalc-pay">재계산</button>
            <div id="pay-summary" class="summary-grid"></div>
          </div>
        </section>

        <section id="tab-chat" class="tab hidden role-tab">
          <div class="grid-2">
            <div class="card">
              <h2>전체 채팅</h2>
              <div id="chat-list" class="chat-list"></div>
              <div class="chat-compose">
                <textarea id="chat-input" rows="3" placeholder="메시지 입력"></textarea>
                <div class="row gap">
                  <button id="chat-proofread">맞춤법 보정</button>
                  <button id="send-chat">전송</button>
                </div>
              </div>
            </div>
            <div class="card">
              <h2>채팅 안내</h2>
              <ul class="plain-list">
                <li>- 카카오톡 방식</li>
                <li>- 사진/파일 없음</li>
                <li>- 실시간 반영</li>
                <li>- 로그인 언어 기준 표시</li>
              </ul>
            </div>
          </div>
        </section>

        <section id="tab-handover" class="tab hidden role-tab">
          <div class="grid-2">
            <div class="card">
              <h2>인수인계</h2>
              <label>라인</label>
              <select id="handover-line"></select>
              <label>공정</label>
              <select id="handover-process"></select>
              <label>현상</label>
              <textarea id="handover-phenomenon" rows="3"></textarea>
              <label>원인</label>
              <textarea id="handover-cause" rows="3"></textarea>
              <label>조치</label>
              <textarea id="handover-action" rows="4"></textarea>
              <div class="row gap wrap">
                <button id="handover-suggest">채팅기반 추천</button>
                <button id="handover-proofread">맞춤법 보정</button>
                <button id="handover-save">저장</button>
                <button id="handover-send">전송</button>
              </div>
              <div id="handover-status" class="status"></div>
            </div>
            <div class="card">
              <h2>추천 문장</h2>
              <div id="handover-suggestions" class="suggestions"></div>
            </div>
          </div>
        </section>

        <section id="tab-search" class="tab hidden role-tab">
          <div class="card">
            <h2>통합검색</h2>
            <div class="row gap wrap">
              <input id="search-query" type="text" placeholder="MES / ECS / 공정 / 설비 / 인수인계 / 조치방법 검색" />
              <button id="run-search">검색</button>
            </div>
            <div id="search-results" class="search-results"></div>
          </div>
        </section>
      </main>
    </section>

    <aside id="settings-panel" class="settings hidden">
      <div class="card">
        <div class="section-head"><h2>설정</h2><button id="close-settings" class="ghost">닫기</button></div>
        <label>표시 언어</label>
        <select id="setting-language">
          <option value="ko">한국어</option>
          <option value="en">English</option>
        </select>
        <p class="muted">로그인 언어 선택값을 저장합니다.</p>
      </div>
    </aside>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
